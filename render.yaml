# Render Blueprint — FastAPI backend (native Python, no Docker needed).
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
services:
  - type: web
    name: box-office-science-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGODB_URI
        sync: false          # set your MongoDB Atlas connection string in the dashboard
      - key: MONGODB_DB
        value: boxoffice
      - key: SECRET_KEY
        sync: false          # must match the frontend's JWT_SECRET on Vercel
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: DEBUG
        value: "false"
